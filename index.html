<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schema Builder — CRM</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── Toolbar ─────────────────────────────────────── */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    z-index: 1000;
    user-select: none;
  }

  #toolbar h1 {
    font-size: 13px;
    font-weight: 600;
    color: #c9d1d9;
    margin-right: 12px;
    font-family: -apple-system, sans-serif;
    letter-spacing: -0.01em;
  }

  .schema-btn {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: transparent;
    color: #8b949e;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: -apple-system, sans-serif;
  }
  .schema-btn:hover { border-color: #58a6ff; color: #58a6ff; }
  .schema-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

  .toolbar-sep { width: 1px; height: 24px; background: #30363d; margin: 0 8px; }

  #search {
    margin-left: auto;
    padding: 5px 10px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 12px;
    font-family: -apple-system, sans-serif;
    width: 180px;
    outline: none;
  }
  #search:focus { border-color: #58a6ff; }
  #search::placeholder { color: #484f58; }

  #zoom-info {
    font-size: 11px;
    color: #484f58;
    margin-left: 12px;
    font-family: -apple-system, sans-serif;
    min-width: 48px;
  }

  .hint {
    font-size: 11px;
    color: #484f58;
    font-family: -apple-system, sans-serif;
  }

  /* ── Canvas ──────────────────────────────────────── */
  #canvas-wrap {
    position: fixed;
    top: 52px; left: 0; right: 0; bottom: 28px;
    overflow: hidden;
    cursor: grab;
  }
  #canvas-wrap.panning { cursor: grabbing; }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 4000px;
    height: 3000px;
    transform-origin: 0 0;
  }

  #svg-lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* ── Table nodes ─────────────────────────────────── */
  .table-node {
    position: absolute;
    width: 220px;
    border-radius: 8px;
    border: 1px solid #30363d;
    background: #161b22;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    cursor: grab;
    user-select: none;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .table-node:hover { border-color: #58a6ff66; }
  .table-node.active { border-color: #58a6ff; box-shadow: 0 0 0 2px #1f6feb44, 0 8px 32px rgba(0,0,0,0.6); }
  .table-node.dimmed { opacity: 0.25; }
  .table-node.dragging { cursor: grabbing; box-shadow: 0 12px 48px rgba(0,0,0,0.7); z-index: 100; }

  .table-header {
    padding: 8px 10px;
    border-radius: 7px 7px 0 0;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: grab;
  }

  .table-header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .table-header .table-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
  }

  .table-header .row-count {
    font-size: 9px;
    opacity: 0.6;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }

  .table-fields {
    border-top: 1px solid #21262d;
  }

  .field-row {
    padding: 3px 10px;
    display: flex;
    align-items: center;
    gap: 5px;
    border-bottom: 1px solid #21262d;
    transition: background 0.1s;
  }
  .field-row:last-child { border-bottom: none; }
  .field-row:hover { background: #1c2128; }

  .field-badge {
    font-size: 8px;
    font-weight: 700;
    padding: 1px 3px;
    border-radius: 3px;
    flex-shrink: 0;
    letter-spacing: 0.05em;
    font-family: -apple-system, sans-serif;
  }
  .pk  { background: #ffa65733; color: #ffa657; }
  .fk  { background: #58a6ff22; color: #58a6ff; }
  .uniq{ background: #3fb95022; color: #3fb950; }

  .field-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11px;
    color: #c9d1d9;
  }

  .field-type {
    font-size: 10px;
    color: #484f58;
    flex-shrink: 0;
  }

  .field-missing {
    background: #ff7b7211;
    border-left: 2px solid #ff7b72;
  }
  .field-missing .field-name { color: #ff7b72; }

  /* ── Legend / Status bar ─────────────────────────── */
  #statusbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 28px;
    background: #161b22;
    border-top: 1px solid #30363d;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 16px;
    z-index: 1000;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: -apple-system, sans-serif;
    font-size: 11px;
    color: #8b949e;
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* ── SVG lines ───────────────────────────────────── */
  .relation-line {
    fill: none;
    stroke: #30363d;
    stroke-width: 1.5;
    transition: stroke 0.15s, stroke-width 0.15s;
  }
  .relation-line.active {
    stroke: #58a6ff;
    stroke-width: 2;
  }
  .relation-line.missing {
    stroke: #ff7b72;
    stroke-dasharray: 4 3;
    stroke-width: 1.5;
  }

  .relation-arrow {
    fill: #30363d;
  }
  .relation-arrow.active { fill: #58a6ff; }

  /* ── Reset button ────────────────────────────────── */
  #reset-btn {
    padding: 3px 10px;
    border-radius: 5px;
    border: 1px solid #30363d;
    background: transparent;
    color: #8b949e;
    font-size: 11px;
    cursor: pointer;
    font-family: -apple-system, sans-serif;
    transition: all 0.15s;
    margin-left: 4px;
  }
  #reset-btn:hover { border-color: #58a6ff; color: #58a6ff; }
</style>
</head>
<body>

<div id="toolbar">
  <h1>⬡ Schema Viewer</h1>
  <button class="schema-btn active" onclick="switchSchema('clare')">Clare's CRM</button>
  <button class="schema-btn" onclick="switchSchema('josephine')">Josephine's CRM</button>
  <button class="schema-btn" onclick="switchSchema('merged')">Merged View</button>
  <div class="toolbar-sep"></div>
  <button id="reset-btn" onclick="resetLayout()">Reset layout</button>
  <span class="hint">Drag tables · Scroll to zoom · Drag canvas to pan · Click table to highlight</span>
  <input id="search" placeholder="Search tables…" oninput="filterTables(this.value)">
  <span id="zoom-info">100%</span>
</div>

<div id="canvas-wrap">
  <div id="canvas">
    <svg id="svg-lines">
      <defs>
        <marker id="arrow-default" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" class="relation-arrow" />
        </marker>
        <marker id="arrow-active" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" class="relation-arrow active" />
        </marker>
        <marker id="arrow-missing" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="#ff7b72" />
        </marker>
      </defs>
    </svg>
  </div>
</div>

<div id="statusbar">
  <span class="legend-item"><span class="legend-dot" style="background:#6e40c9"></span>Auth/Tenant</span>
  <span class="legend-item"><span class="legend-dot" style="background:#8b5cf6"></span>Contacts</span>
  <span class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span>Messaging</span>
  <span class="legend-item"><span class="legend-dot" style="background:#f97316"></span>Bookings</span>
  <span class="legend-item"><span class="legend-dot" style="background:#10b981"></span>Services</span>
  <span class="legend-item"><span class="legend-dot" style="background:#ec4899"></span>Practices</span>
  <span class="legend-item"><span class="legend-dot" style="background:#eab308"></span>Automations</span>
  <span class="legend-item"><span class="legend-dot" style="background:#ef4444"></span>Safety</span>
</div>

<script>

// Build merged = Clare's tables with Josephine-only fields highlighted
SCHEMAS.merged.tables = SCHEMAS.clare.tables.map(t => ({...t, fields: [...t.fields]}));
SCHEMAS.merged.relations = [...SCHEMAS.clare.relations];

// Add Josephine's tables that don't exist in Clare's
const clareTableIds = new Set(SCHEMAS.clare.tables.map(t => t.id));
for (const jt of SCHEMAS.josephine.tables) {
  if (!clareTableIds.has(jt.id)) {
    SCHEMAS.merged.tables.push({
      ...jt,
      x: jt.x + 1800, y: jt.y,
      missing: true,  // marks as "Josephine only, not yet in Clare"
    });
    for (const r of SCHEMAS.josephine.relations) {
      if (r.from === jt.id || r.to === jt.id) {
        SCHEMAS.merged.relations.push({...r, missing: true});
      }
    }
  }
}

// Mark Josephine fields missing from Clare's contacts
const clareContacts = SCHEMAS.merged.tables.find(t => t.id === 'contacts');
const josephineContactFields = ['nickname','fake_name','real_name','seriousness','quality','language','payment_method','preferred_slot','age_range','age','contact_channel','ad_platform','kind'];
const clareFieldNames = new Set(clareContacts.fields.map(f => f.n));
for (const fn of josephineContactFields) {
  if (!clareFieldNames.has(fn)) {
    clareContacts.fields.push({n: fn, t:'—', missing: true});
  }
}

// Mark missing fields on deals
const clareDeals = SCHEMAS.merged.tables.find(t => t.id === 'deals');
for (const fn of ['probability','duration','service_name_snapshot','is_duo','duo_with']) {
  clareDeals.fields.push({n: fn, t:'—', missing: true});
}

// ── State ─────────────────────────────────────────────────────────
let currentSchema = 'clare';
let positions = {};
let activeTable = null;
let zoom = 1;
let panX = 0, panY = 0;
let isPanning = false, panStartX = 0, panStartY = 0, panOriginX = 0, panOriginY = 0;
let isDragging = false, dragNode = null, dragStartX = 0, dragStartY = 0, dragOriginX = 0, dragOriginY = 0;

const canvas = document.getElementById('canvas');
const svgEl  = document.getElementById('svg-lines');
const wrap   = document.getElementById('canvas-wrap');
const zoomInfo = document.getElementById('zoom-info');

// ── Init positions ────────────────────────────────────────────────
function initPositions(schemaId) {
  if (!positions[schemaId]) {
    positions[schemaId] = {};
    for (const t of SCHEMAS[schemaId].tables) {
      positions[schemaId][t.id] = { x: t.x, y: t.y };
    }
  }
}

// ── Render ────────────────────────────────────────────────────────
function render() {
  const schema = SCHEMAS[currentSchema];
  initPositions(currentSchema);
  const pos = positions[currentSchema];

  // Clear existing table nodes
  document.querySelectorAll('.table-node').forEach(el => el.remove());
  svgEl.innerHTML = `<defs>
    <marker id="arrow-default" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#30363d"/>
    </marker>
    <marker id="arrow-active" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-missing" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#ff7b72"/>
    </marker>
  </defs>`;

  // Render tables
  for (const table of schema.tables) {
    const d = DOMAINS[table.domain] || DOMAINS.contacts;
    const p = pos[table.id];
    const node = document.createElement('div');
    node.className = 'table-node' + (table.missing ? ' missing-table' : '');
    node.id = 'node-' + table.id;
    node.style.left = p.x + 'px';
    node.style.top  = p.y + 'px';
    if (table.missing) node.style.borderColor = '#ff7b7255';

    const header = document.createElement('div');
    header.className = 'table-header';
    header.style.background = d.bg;
    header.style.color = d.color;
    header.innerHTML = `
      <span class="dot" style="background:${d.color}"></span>
      <span class="table-name">${table.id}</span>
      ${table.missing ? '<span style="font-size:9px;opacity:0.7;text-transform:none;letter-spacing:0;font-family:-apple-system,sans-serif">⚠ add to Clare</span>' : ''}
    `;

    const fieldsDiv = document.createElement('div');
    fieldsDiv.className = 'table-fields';
    for (const f of table.fields) {
      const row = document.createElement('div');
      row.className = 'field-row' + (f.missing ? ' field-missing' : '');
      let badge = '';
      if (f.pk)   badge = '<span class="field-badge pk">PK</span>';
      else if (f.fk)   badge = '<span class="field-badge fk">FK</span>';
      else if (f.uniq) badge = '<span class="field-badge uniq">UQ</span>';
      row.innerHTML = `${badge}<span class="field-name">${f.n}</span><span class="field-type">${f.t}</span>`;
      fieldsDiv.appendChild(row);
    }

    node.appendChild(header);
    node.appendChild(fieldsDiv);
    canvas.appendChild(node);

    // Click to highlight
    node.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      e.stopPropagation();
      // Start drag
      isDragging = true;
      dragNode = table.id;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      dragOriginX = p.x;
      dragOriginY = p.y;
      node.classList.add('dragging');
    });

    node.addEventListener('click', e => {
      e.stopPropagation();
      if (activeTable === table.id) {
        activeTable = null;
      } else {
        activeTable = table.id;
      }
      updateHighlight();
    });
  }

  drawLines();
  updateHighlight();
}

// ── Draw SVG relation lines ───────────────────────────────────────
function drawLines() {
  const schema = SCHEMAS[currentSchema];
  const pos = positions[currentSchema];

  // Remove old paths
  svgEl.querySelectorAll('path').forEach(p => p.remove());

  for (const rel of schema.relations) {
    const fromPos = pos[rel.from];
    const toPos   = pos[rel.to];
    if (!fromPos || !toPos) continue;

    const fromEl = document.getElementById('node-' + rel.from);
    const toEl   = document.getElementById('node-' + rel.to);
    if (!fromEl || !toEl) continue;

    const fw = fromEl.offsetWidth  || 220;
    const fh = fromEl.offsetHeight || 100;
    const tw = toEl.offsetWidth    || 220;
    const th = toEl.offsetHeight   || 100;

    // Connect right-edge of from to left-edge of to, or auto-side
    const fx = fromPos.x + fw;
    const fy = fromPos.y + fh / 2;
    const tx = toPos.x;
    const ty = toPos.y + th / 2;

    // Choose sides intelligently
    let x1, y1, x2, y2;
    if (fromPos.x + fw < toPos.x + 30) {
      x1 = fromPos.x + fw; y1 = fromPos.y + fh / 2;
      x2 = toPos.x;        y2 = toPos.y + th / 2;
    } else if (toPos.x + tw < fromPos.x + 30) {
      x1 = fromPos.x;      y1 = fromPos.y + fh / 2;
      x2 = toPos.x + tw;   y2 = toPos.y + th / 2;
    } else if (fromPos.y + fh < toPos.y) {
      x1 = fromPos.x + fw / 2; y1 = fromPos.y + fh;
      x2 = toPos.x + tw / 2;  y2 = toPos.y;
    } else {
      x1 = fromPos.x + fw / 2; y1 = fromPos.y;
      x2 = toPos.x + tw / 2;  y2 = toPos.y + th;
    }

    const dx = Math.abs(x2 - x1) * 0.5;
    const d = `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('class', 'relation-line' + (rel.missing ? ' missing' : ''));
    path.setAttribute('marker-end', rel.missing ? 'url(#arrow-missing)' : 'url(#arrow-default)');
    path.dataset.from = rel.from;
    path.dataset.to   = rel.to;
    svgEl.appendChild(path);
  }
}

// ── Highlight active table ────────────────────────────────────────
function updateHighlight() {
  const schema = SCHEMAS[currentSchema];
  document.querySelectorAll('.table-node').forEach(el => {
    el.classList.remove('active', 'dimmed');
  });
  svgEl.querySelectorAll('path').forEach(p => {
    p.classList.remove('active');
    p.setAttribute('marker-end', p.classList.contains('missing') ? 'url(#arrow-missing)' : 'url(#arrow-default)');
  });

  if (!activeTable) return;

  const related = new Set([activeTable]);
  for (const rel of schema.relations) {
    if (rel.from === activeTable) related.add(rel.to);
    if (rel.to   === activeTable) related.add(rel.from);
  }

  document.querySelectorAll('.table-node').forEach(el => {
    const id = el.id.replace('node-', '');
    if (!related.has(id)) el.classList.add('dimmed');
    else if (id === activeTable) el.classList.add('active');
  });

  svgEl.querySelectorAll('path').forEach(p => {
    if (p.dataset.from === activeTable || p.dataset.to === activeTable) {
      p.classList.add('active');
      p.setAttribute('marker-end', 'url(#arrow-active)');
    }
  });
}

// ── Drag tables ───────────────────────────────────────────────────
document.addEventListener('mousemove', e => {
  if (isDragging && dragNode) {
    const dx = (e.clientX - dragStartX) / zoom;
    const dy = (e.clientY - dragStartY) / zoom;
    positions[currentSchema][dragNode].x = dragOriginX + dx;
    positions[currentSchema][dragNode].y = dragOriginY + dy;
    const el = document.getElementById('node-' + dragNode);
    if (el) {
      el.style.left = positions[currentSchema][dragNode].x + 'px';
      el.style.top  = positions[currentSchema][dragNode].y + 'px';
    }
    drawLines();
    return;
  }
  if (isPanning) {
    const dx = e.clientX - panStartX;
    const dy = e.clientY - panStartY;
    panX = panOriginX + dx;
    panY = panOriginY + dy;
    applyTransform();
  }
});

document.addEventListener('mouseup', e => {
  if (isDragging) {
    document.getElementById('node-' + dragNode)?.classList.remove('dragging');
    isDragging = false;
    dragNode = null;
  }
  if (isPanning) {
    isPanning = false;
    wrap.classList.remove('panning');
  }
});

// ── Pan canvas ────────────────────────────────────────────────────
wrap.addEventListener('mousedown', e => {
  if (e.button === 0 && !isDragging) {
    isPanning = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    panOriginX = panX;
    panOriginY = panY;
    wrap.classList.add('panning');
    // Click canvas background deselects
    activeTable = null;
    updateHighlight();
  }
});

// ── Zoom ──────────────────────────────────────────────────────────
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  // Zoom towards cursor
  panX = mx - (mx - panX) * delta;
  panY = my - (my - panY) * delta;
  zoom = Math.max(0.2, Math.min(2.5, zoom * delta));
  applyTransform();
}, { passive: false });

function applyTransform() {
  canvas.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  zoomInfo.textContent = Math.round(zoom * 100) + '%';
}

// ── Switch schema ─────────────────────────────────────────────────
function switchSchema(id) {
  currentSchema = id;
  activeTable = null;
  document.querySelectorAll('.schema-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['clare','josephine','merged'][i] === id);
  });
  render();
}

// ── Search ────────────────────────────────────────────────────────
function filterTables(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.table-node').forEach(el => {
    const id = el.id.replace('node-', '');
    el.style.display = (!q || id.includes(q)) ? '' : 'none';
  });
}

// ── Reset layout ──────────────────────────────────────────────────
function resetLayout() {
  delete positions[currentSchema];
  panX = 0; panY = 0; zoom = 0.7;
  applyTransform();
  render();
}

// ── Boot ──────────────────────────────────────────────────────────
zoom = 0.55;
panX = 20;
panY = 20;
applyTransform();
render();
